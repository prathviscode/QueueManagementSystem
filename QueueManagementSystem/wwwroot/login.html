<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Queue System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex; justify-content: center; align-items: center;
        }
        .login-container {
            display: flex; width: 800px;
            background: white; border-radius: 15px;
            overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .left {
            flex: 1;
            background: linear-gradient(135deg, #0d6efd, #3a8bfd);
            color: white; display: flex; flex-direction: column;
            justify-content: center; padding: 40px;
        }
        .left h1 { font-size: 28px; margin-bottom: 10px; }
        .left p { opacity: 0.8; }
        .right { flex: 1; padding: 40px; }
        .right h2 { text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid #ccc; outline: none; transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 5px rgba(13,110,253,0.5);
        }
        .btn {
            width: 100%; padding: 12px; background: #0d6efd;
            color: white; border: none; border-radius: 8px;
            cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .btn:hover { background: #0b5ed7; }
        .btn:disabled { background: gray; cursor: not-allowed; }
        .error { margin-top: 10px; text-align: center; color: red; }
        .loader { display: none; text-align: center; margin-top: 10px; }
        .loader span {
            display: inline-block; width: 10px; height: 10px;
            background: #0d6efd; border-radius: 50%; margin: 3px;
            animation: bounce 0.6s infinite alternate;
        }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { to { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <!-- FIX: Already-logged-in check is role-aware.
         Previously it redirected ALL logged-in users to index.html,
         but Staff should go to staff.html. -->
    <script>
        (function () {
            var token = localStorage.getItem("token");
            var role  = localStorage.getItem("role");
            if (token) {
                if (role === "Admin")       window.location.replace("index.html");
                else if (role === "Staff")  window.location.replace("staff.html");
            }
        })();
    </script>

    <div class="login-container">
        <div class="left">
            <h1>Queue Management</h1>
            <p>Manage tokens, queues and the display system easily.</p>
        </div>
        <div class="right">
            <h2>Login</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="username">
            </div>
            <div class="input-group">
                <!-- FIX: Added Enter-key support via keydown listener -->
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            </div>
            <button class="btn" id="loginBtn" onclick="login()">Login</button>
            <p style="text-align:center; margin-top:10px;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
            <div class="loader" id="loader">
                <span></span><span></span><span></span>
            </div>
            <p class="error" id="error"></p>
        </div>
    </div>

    <script>
        // FIX: Allow pressing Enter in password field to submit
        document.getElementById("password").addEventListener("keydown", function (e) {
            if (e.key === "Enter") login();
        });

        // FIX: Centralise the API base URL so it is easy to change for production
        const API_BASE = "https://localhost:7194";

        async function login() {
            const username  = document.getElementById("username").value.trim();
            const password  = document.getElementById("password").value;
            const btn       = document.getElementById("loginBtn");
            const loader    = document.getElementById("loader");
            const errorBox  = document.getElementById("error");

            errorBox.innerText = "";

            if (!username || !password) {
                errorBox.innerText = "Please enter username and password.";
                return;
            }

            btn.disabled = true;
            loader.style.display = "block";

            try {
                const res = await fetch(API_BASE + "/api/Auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                // FIX: Handle non-JSON error responses safely
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); }
                catch { throw new Error(text || "Server error"); }

                if (!res.ok) throw new Error(data.message || "Login failed.");

                // Store credentials
                localStorage.setItem("token",   data.token);
                localStorage.setItem("role",    data.role);
                localStorage.setItem("counter", data.counter ?? "");

                // Role-aware redirect
                if      (data.role === "Admin") window.location.replace("index.html");
                else if (data.role === "Staff") window.location.replace("staff.html");
                else errorBox.innerText = "Unknown role: " + data.role;

            } catch (err) {
                errorBox.innerText = err.message;
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
