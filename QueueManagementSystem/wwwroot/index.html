<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FIX: SignalR script loaded only ONCE, in <head>. Previously it was
         loaded both in <head> AND at the bottom of <body> – causing double
         registration and potential conflicts. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <style>
        body { background: #f4f6f9; }
        .sidebar { height: 100vh; background: #1e293b; color: white; padding: 20px; }
        .sidebar h4 { margin-bottom: 30px; }
        .sidebar button { width: 100%; margin-bottom: 10px; }
        .header { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card { border-radius: 12px; }
        .token-box { font-size: 40px; font-weight: bold; color: #22c55e; }
        #statusMsg { font-size: 13px; color: #6b7280; margin-top: 6px; }
    </style>
</head>
<body>

    <!-- FIX: Auth guard runs before any content renders -->
    <script>
        if (!localStorage.getItem("token") || localStorage.getItem("role") !== "Admin") {
            window.location.replace("login.html");
        }
    </script>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar">
                <h4>Admin Panel</h4>
                <button class="btn btn-success" onclick="generateToken()">Generate Token</button>
                <button class="btn btn-danger"  onclick="resetQueue()">Reset Queue</button>
                <button class="btn btn-dark mt-2" onclick="openDisplay()">Display Screen</button>
                <hr>
                <button class="btn btn-warning" onclick="logout()">Logout</button>
                <p id="statusMsg">Connecting…</p>
            </div>

            <!-- MAIN -->
            <div class="col-md-10 p-4">

                <!-- HEADER -->
                <div class="header mb-4 d-flex justify-content-between">
                    <h4>Queue Dashboard</h4>
                    <span>👤 Admin</span>
                </div>

                <!-- CURRENT TOKEN -->
                <div class="card p-4 text-center mb-4">
                    <h5>Current Token Being Served</h5>
                    <div id="currentToken" class="token-box">--</div>
                </div>

                <!-- TABLE -->
                <div class="card p-4">
                    <h5>Queue List</h5>
                    <table class="table table-bordered mt-3 text-center">
                        <thead class="table-dark">
                            <tr><th>Token</th><th>Status</th><th>Counter</th></tr>
                        </thead>
                        <tbody id="queueTable"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        // FIX: Consistent base URL (note: endpoint is "Token" with capital T to match controller route)
        const API_BASE = "https://localhost:7194";

        function getAuthHeaders() {
            return {
                "Authorization": "Bearer " + localStorage.getItem("token"),
                "Content-Type": "application/json"
            };
        }

        // ─── SignalR setup ────────────────────────────────────────────────────
        // FIX: SignalR connection is created ONCE at page load, NOT inside loadQueue().
        // Creating a new connection on every loadQueue() call (as the original did)
        // caused a new WebSocket to be opened every time data refreshed, leading to
        // dozens/hundreds of open connections and exponential update storms.
        const connection = new signalR.HubConnectionBuilder()
            .withUrl(API_BASE + "/queueHub", {
                // FIX: Pass JWT token for authenticated hub connections
                accessTokenFactory: () => localStorage.getItem("token")
            })
            .withAutomaticReconnect()
            .build();

        connection.on("ReceiveUpdate", () => {
            loadQueue(); // Refresh data when server pushes an update
        });

        connection.onreconnecting(() => {
            document.getElementById("statusMsg").innerText = "Reconnecting…";
        });
        connection.onreconnected(() => {
            document.getElementById("statusMsg").innerText = "Connected ✓";
            loadQueue();
        });

        connection.start()
            .then(() => {
                document.getElementById("statusMsg").innerText = "Connected ✓";
                loadQueue();
            })
            .catch(err => {
                document.getElementById("statusMsg").innerText = "SignalR error";
                console.error("SignalR connection error:", err);
                // Still load queue data via REST even if SignalR fails
                loadQueue();
            });

        // ─── Generate Token ───────────────────────────────────────────────────
        async function generateToken() {
            try {
                const res = await fetch(API_BASE + "/api/Token/generate", {
                    method: "POST",
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                if (!res.ok) { alert(data.message || "Failed to generate token."); return; }
                // Server will push ReceiveUpdate → loadQueue called automatically
            } catch (err) {
                alert("Network error: " + err.message);
            }
        }

        // ─── Reset Queue ──────────────────────────────────────────────────────
        async function resetQueue() {
            if (!confirm("Are you sure you want to reset the entire queue?")) return;
            try {
                const res = await fetch(API_BASE + "/api/Token/reset", {
                    method: "POST",
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                alert(data.message);
                // Server will push ReceiveUpdate → loadQueue called automatically
            } catch (err) {
                alert("Network error: " + err.message);
            }
        }

        // ─── Load Queue (REST poll) ────────────────────────────────────────────
        async function loadQueue() {
            try {
                const res = await fetch(API_BASE + "/api/Token/all", {
                    headers: getAuthHeaders()
                });
                if (!res.ok) return;
                const data = await res.json();

                let tableHtml = "";
                let currentDisplay = "--";

                data.forEach(t => {
                    let rowClass = "";
                    if (t.status === "Serving") {
                        rowClass = "table-success";
                        // FIX: Show all serving tokens (multi-counter support)
                        currentDisplay = (currentDisplay === "--" ? "" : currentDisplay + " | ")
                            + "T" + t.tokenNumber + " @ Counter " + (t.counterNumber ?? "?");
                    }
                    if (t.status === "Done") rowClass = "table-secondary";

                    tableHtml += `<tr class="${rowClass}">
                        <td>${t.tokenNumber}</td>
                        <td>${t.status}</td>
                        <td>${t.counterNumber ?? "-"}</td>
                    </tr>`;
                });

                document.getElementById("queueTable").innerHTML = tableHtml || "<tr><td colspan='3'>Queue is empty</td></tr>";
                document.getElementById("currentToken").innerText = currentDisplay;

            } catch (err) {
                console.error("loadQueue error:", err);
            }
        }

        function openDisplay() { window.open("display.html", "_blank"); }

        function logout() {
            localStorage.clear();
            window.location.replace("login.html");
        }
    </script>
</body>
</html>
